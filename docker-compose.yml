version: '3.8'

# ═══════════════════════════════════════════════════════════════
#  ALL-IN-ONE AI CLOUD WORKSPACE — by 3da4ya © 2026
#  Порядок старту: security-gate → db + redis → api → web
#                  backup + monitoring — незалежно
# ═══════════════════════════════════════════════════════════════

services:

  # ── [1] SECURITY GATE — запускається ПЕРШИМ, блокує деплой при вразливостях
  security-gate:
    image: alpine:3.18
    container_name: security_gate
    volumes:
      - ./api:/scan/api:ro
      - ./scripts/scan.sh:/scan.sh:ro
    command: sh /scan.sh
    networks:
      - coworking-net

  # ── [2] БАЗА ДАНИХ PostgreSQL
  db-server:
    image: postgres:15-alpine
    container_name: db_workspace
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [3] REDIS КЕШ — LRU, ліміт 256 МБ
  redis-cache:
    image: redis:7-alpine
    container_name: redis_workspace
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [4] API — Node.js
  api-server:
    image: node:18-alpine
    container_name: api_workspace
    working_dir: /usr/src/app
    command: sh -c "npm install --production && node index.js"
    volumes:
      - ./api:/usr/src/app
    environment:
      NODE_ENV:          production
      PORT:              3001
      DB_HOST:           db-server
      DB_PORT:           5432
      DB_NAME:           ${POSTGRES_DB}
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      REDIS_HOST:        redis-cache
      REDIS_PORT:        6379
      GOTIFY_URL:        http://push-server/message
      GOTIFY_TOKEN:      ${GOTIFY_APP_TOKEN}
      TG_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN}
      TG_CHAT_ID:        ${TELEGRAM_CHAT_ID}
    depends_on:
      db-server:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      security-gate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [5] ФРОНТЕНД — nginx
  web-server:
    image: nginx:alpine
    container_name: web_workspace
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [6] АВТО-БЕКАП БД — щоденний, ротація 7 днів
  db-backup:
    image: postgres:15-alpine
    container_name: db_backup
    environment:
      PGPASSWORD:    ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB:   ${POSTGRES_DB}
      DB_HOST:       db-server
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: sh /backup.sh
    depends_on:
      db-server:
        condition: service_healthy
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [7] PUSH-СЕРВЕР Gotify
  push-server:
    image: gotify/server:latest
    container_name: gotify_workspace
    ports:
      - "8080:80"
    environment:
      GOTIFY_DEFAULTUSER_NAME:     admin
      GOTIFY_DEFAULTUSER_PASS:     ${GOTIFY_PASSWORD}
      GOTIFY_SERVER_KEEPALIVEPERIOD: 60s
    volumes:
      - gotify-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [8] ZEROTIER P2P-МЕРЕЖА
  zerotier-node:
    image: zerotier/zerotier:latest
    container_name: zerotier_workspace
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      ZEROTIER_NETWORK_ID: ${ZEROTIER_NETWORK_ID}
    volumes:
      - zerotier-data:/var/lib/zerotier-one
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [9] cAdvisor — метрики контейнерів
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor_workspace
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8081:8080"
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [10] PROMETHEUS — збір метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_workspace
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - coworking-net
    restart: unless-stopped

  # ── [11] GRAFANA — дашборди
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_workspace
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         http://localhost:3000
      GF_ALERTING_ENABLED:        "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - coworking-net
    restart: unless-stopped

# ── МЕРЕЖА
networks:
  coworking-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── VOLUMES
volumes:
  db-data:
  redis-data:
  gotify-data:
  zerotier-data:
  prometheus-data:
  grafana-data:
